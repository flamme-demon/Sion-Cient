[package]
name = "sion-client"
version = "0.1.0"
description = "Sion Client - Voice/Text client based on Matrix + LiveKit"
authors = ["Sion"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"

# Tauri avec runtime CEF (branche feat/cef)
tauri = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef", features = ["cef"] }
# Désactiver le sandbox CEF pour le développement
tauri-runtime-cef = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef", default-features = false }
tauri-plugin-log = "2"
rdev = { git = "https://github.com/rustdesk-org/rdev" }
open = "5"
reqwest = { version = "0.12", features = ["rustls-tls", "cookies", "json"], default-features = false }
scraper = "0.22"
base64 = "0.22"

[features]
default = ["cef"]
cef = ["tauri/cef"]

# Rediriger toutes les dépendances tauri vers la branche feat/cef
[patch.crates-io]
tauri = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-build = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-macros = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-runtime = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-runtime-wry = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-utils = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
tauri-plugin = { git = "https://github.com/tauri-apps/tauri", branch = "feat/cef" }
