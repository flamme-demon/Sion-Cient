[package]
name = "tauri-runtime-cef"
version = "0.1.0"
# Vendored from tauri-apps/tauri @ rev 7372c8ee, with a one-handler patch to
# grant DESKTOP_*_CAPTURE in on_request_media_access_permission (so CEF can
# surface the screen-share source picker on Windows). See
# patches/cef-desktop-media-picker.md. Workspace-inherited fields are
# concretized from that workspace's [workspace.package]; sibling tauri crates
# point at the same git rev so they unify with [patch.crates-io] in ../../Cargo.toml.
authors = ["Tauri Programme within The Commons Conservancy"]
homepage = "https://tauri.app/"
repository = "https://github.com/tauri-apps/tauri"
categories = ["gui", "web-programming"]
license = "Apache-2.0 OR MIT"
edition = "2024"
rust-version = "1.88"

[dependencies]
dioxus-debug-cell = "0.1"
tauri-runtime = { version = "2.9.2", git = "https://github.com/tauri-apps/tauri", rev = "7372c8ee" }
tauri-utils = { version = "2.8.0", git = "https://github.com/tauri-apps/tauri", rev = "7372c8ee", features = [
  "html-manipulation",
] }
html5ever = "0.29"
raw-window-handle = "0.6"
url = "2"
http = "1"
cef = { version = "=148.0.0", default-features = false }
# Not actually used directly, just locking it.
cef-dll-sys = "=148.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
kuchiki = { package = "kuchikiki", version = "0.8.8-speedreader" }
sha2 = "0.10"
base64 = "0.22"
dirs = "6"
log = "0.4.21"

[target."cfg(windows)".dependencies]
windows = { version = "0.61", features = [
  "Win32_Graphics",
  "Win32_Graphics_Gdi",
  "Win32_Graphics_Dwm",
  "Win32_UI_HiDpi",
  "Win32_UI_Input",
  "Win32_UI_Input_KeyboardAndMouse",
  "Win32_UI_WindowsAndMessaging",
  "Win32_UI_Controls",
  "Win32_UI_Shell",
  "Win32_System_Com",
  "Win32_System_LibraryLoader",
] }

[target."cfg(target_os = \"macos\")".dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3", features = [] }
objc2-foundation = { version = "0.3", features = ["NSNotification"] }

[target."cfg(any(target_os = \"linux\", target_os = \"dragonfly\", target_os = \"freebsd\", target_os = \"openbsd\", target_os = \"netbsd\"))".dependencies]
gtk = { version = "0.18", features = ["v3_24"] }
x11-dl = "2.21"
dlopen2 = { version = "0.8", features = ["derive"] }

[features]
default = ["sandbox"]
devtools = []
macos-private-api = ["tauri-runtime/macos-private-api"]
sandbox = ["cef/sandbox"]
