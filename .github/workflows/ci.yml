name: CI

# Non-regression gate: runs on every push/PR to main. The JS job is the fast
# path (~2 min): typecheck + vitest unit tests. The Rust job compiles the
# crate in debug (CEF deps make it heavy — cargo cache keeps re-runs fast)
# and runs the unit tests (summarize run_bounded guards, …).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-js:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit tests (vitest)
        run: bun run test

  test-rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        # Same prereqs as the release build — tauri-runtime-cef's *-sys build
        # scripts need the gtk/glib/soup .pc files even for a debug testbuild.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config curl wget file zstd squashfs-tools \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libglib2.0-dev \
            libasound2-dev libudev-dev libpulse-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev \
            libnss3 libgbm1 libxss1 libasound2t64 libxshmfence1 \
            libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 \
            libpango-1.0-0 libcairo2 libatk-bridge2.0-0 libatk1.0-0 \
            libgtk-3-0t64 libfuse2t64

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 'stable'
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          # Distinct key from the release workflow (debug vs release profile).
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test -j4
