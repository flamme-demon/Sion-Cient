name: Release

# Triggered when we push a `v*` tag (e.g. `v1.1.0`). Builds Linux AppImage
# and Windows NSIS installer (.exe) in parallel, then publishes a GitHub Release with both
# artifacts attached. The version string is derived from the tag itself
# so we don't have to keep the workflow in sync with package.json.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0). For dry runs.'
        required: false
        default: ''

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  # -------------------------------------------------------------------------
  # Linux AppImage. Uses the existing build-scripts/build-appimage.sh which
  # downloads linuxdeploy on demand, so the workflow only has to install
  # bun + rust + a handful of system libs that CEF (and FUSE for AppImage
  # mounting) need at build time.
  # -------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Tauri's standard Ubuntu prereqs (gtk/soup/webkit -dev) — we don't
          # use webkit at runtime (CEF) but tauri-runtime-cef transitively
          # depends on glib-rs/gtk-rs whose `*-sys` build scripts call
          # pkg-config and need the .pc files those -dev packages provide.
          # Plus the CEF runtime libs (nss, gbm, xss, drm…) needed at build
          # for the linker to resolve, and AppImage tooling (zstd, fuse2).
          sudo apt-get install -y \
            build-essential pkg-config curl wget file zstd squashfs-tools \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libglib2.0-dev \
            libasound2-dev libudev-dev libpulse-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev \
            libnss3 libgbm1 libxss1 libasound2t64 libxshmfence1 \
            libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 \
            libpango-1.0-0 libcairo2 libatk-bridge2.0-0 libatk1.0-0 \
            libgtk-3-0t64 libfuse2t64

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - uses: dtolnay/rust-toolchain@stable
        with:
          # tauri-runtime-cef rev a9525cf pulls in tauri-cli which requires
          # edition 2024 (Rust ≥ 1.85). Cargo parses every workspace member
          # of the git dep, not just the one we use, so even though we don't
          # build the CLI ourselves we still need a recent toolchain.
          toolchain: 'stable'
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          # Cargo.lock pinpoints the exact dependency graph; bust the cache
          # when it changes so we don't keep stale build outputs around.
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build AppImage
        run: ./build-scripts/build-appimage.sh
        env:
          # Baked into the JS bundle by Vite (GIF search — Klipy).
          VITE_KLIPY_API_KEY: ${{ secrets.KLIPY_API_KEY }}

      - name: Upload AppImage as artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: dist-appimage/*.AppImage
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Windows NSIS installer (.exe). We invoke `tauri build --bundles nsis`
  # directly (NSIS handles the CEF resource injection cleanly) instead of the
  # PowerShell helper script — the helper does dev-machine setup that's
  # unnecessary on a fresh GHA runner.
  # -------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 'stable'
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Compile Rust binary (CEF runtime)
        # We do `cargo build` first instead of going straight to
        # `tauri build`, because we need access to the CEF binaries that
        # the `cef` crate downloads during this step before we can stage
        # them into the bundle.
        working-directory: src-tauri
        run: cargo build --release --features cef

      - name: Stage CEF libs + patch tauri.conf.json
        # The default `tauri build --bundles nsis` doesn't know about CEF —
        # it would ship a 7 MB installer with just the binary, missing
        # libcef.dll and the locales/ folder. We mirror what
        # build-scripts/build-windows.ps1 does locally: copy the CEF
        # output into src-tauri/cef-dist/, then inject a `bundle.resources`
        # mapping into tauri.conf.json so the bundler picks them up. The
        # original config is backed up and restored after the build.
        shell: pwsh
        run: |
          $cefFiles = @(
            "libcef.dll","chrome_elf.dll","d3dcompiler_47.dll",
            "libEGL.dll","libGLESv2.dll","vulkan-1.dll","vk_swiftshader.dll",
            "chrome_100_percent.pak","chrome_200_percent.pak","resources.pak",
            "icudtl.dat","v8_context_snapshot.bin","snapshot_blob.bin","vk_swiftshader_icd.json"
          )
          $cefDir = Get-ChildItem -Path src-tauri/target/release/build -Recurse -Directory -Filter "cef_win*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cefDir) {
            $cefDir = Get-ChildItem -Path src-tauri/target/release/build -Recurse -Directory -Filter "cef_windows*" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $cefDir) {
            Write-Error "CEF directory not found under src-tauri/target/release/build/"
            exit 1
          }
          $cefDist = "src-tauri/cef-dist"
          if (Test-Path $cefDist) { Remove-Item -Recurse -Force $cefDist }
          New-Item -ItemType Directory -Force -Path $cefDist | Out-Null
          foreach ($f in $cefFiles) {
            $src = Join-Path $cefDir.FullName $f
            if (Test-Path $src) { Copy-Item $src "$cefDist/" }
          }
          $localesDir = Join-Path $cefDir.FullName "locales"
          if (Test-Path $localesDir) {
            New-Item -ItemType Directory -Force -Path "$cefDist/locales" | Out-Null
            Copy-Item "$localesDir/*" "$cefDist/locales/" -Force
          }
          Write-Host "CEF staged from $($cefDir.FullName)"

          Copy-Item "src-tauri/tauri.conf.json" "src-tauri/tauri.conf.json.bak"
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $conf.bundle | Add-Member -NotePropertyName "resources" -NotePropertyValue @{
            "cef-dist/*.dll" = "./"
            "cef-dist/*.pak" = "./"
            "cef-dist/*.dat" = "./"
            "cef-dist/*.bin" = "./"
            "cef-dist/*.json" = "./"
            "cef-dist/locales/*" = "./locales/"
          } -Force
          [System.IO.File]::WriteAllText("$PWD/src-tauri/tauri.conf.json", ($conf | ConvertTo-Json -Depth 10), [System.Text.UTF8Encoding]::new($false))

      - name: Build Tauri NSIS installer (.exe)
        # `bun run tauri` uses @tauri-apps/cli (already in devDependencies)
        # so we don't have to recompile tauri-cli from source. NSIS is
        # downloaded automatically on first invocation.
        run: bun run tauri build --bundles nsis -- --features cef
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          # Baked into the JS bundle by Vite (GIF search — Klipy).
          VITE_KLIPY_API_KEY: ${{ secrets.KLIPY_API_KEY }}

      - name: Restore tauri.conf.json
        # Always run, even on previous-step failure, so a re-run starts
        # from a clean config.
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "src-tauri/tauri.conf.json.bak") {
            Move-Item -Force "src-tauri/tauri.conf.json.bak" "src-tauri/tauri.conf.json"
          }

      - name: Upload NSIS installer as artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Aggregate the per-OS artifacts into a single GitHub Release. Body is
  # generated from commits since the previous tag; users can edit the
  # release post-publish to add a curated changelog.
  # -------------------------------------------------------------------------
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need history to compute "since previous tag"

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-appimage
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-nsis
          path: ./artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Hyphenated tags (v1.5.0-beta.1, v2.0.0-rc.1…) publish as
          # pre-releases: excluded from /releases/latest, so the in-app
          # update banner (updateService.ts) never offers a beta to everyone.
          PRERELEASE=""
          case "$TAG" in *-*) PRERELEASE="--prerelease" ;; esac
          # Auto-generate notes from commit history since previous tag.
          # `gh release create --generate-notes` does this server-side.
          gh release create "$TAG" \
            --title "Sion Client $TAG" \
            --generate-notes \
            $PRERELEASE \
            ./artifacts/*.AppImage \
            ./artifacts/*.exe
